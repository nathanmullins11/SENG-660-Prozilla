name: SAST Scan

on:
  push:
  pull_request:

permissions:
  contents: read
  security-events: write   # required to upload SARIF to the Security tab

jobs:
  flawfinder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install flawfinder
        run: sudo apt-get update && sudo apt-get install -y flawfinder

      - name: Run flawfinder (full report, for archive)
        run: flawfinder --html --context > flawfinder_report.html .
        continue-on-error: true

      - name: Run flawfinder (SARIF, for Security tab)
        run: flawfinder --sarif . > flawfinder_results.sarif
        continue-on-error: true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: flawfinder_results.sarif

      - name: Archive full flawfinder report
        uses: actions/upload-artifact@v4
        with:
          name: flawfinder-report
          path: flawfinder_report.html

      - name: Write job summary
        run: |
          echo "## Flawfinder Summary" >> $GITHUB_STEP_SUMMARY
          flawfinder --minlevel=1 . | tail -n 20 >> $GITHUB_STEP_SUMMARY

      - name: Fail build on level >= 4
        run: flawfinder --minlevel=4 --error-level=4 .

  cppcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck (archive full text report)
        run: cppcheck --enable=warning,portability --xml --output-file=cppcheck_report.xml . 2> cppcheck_report.xml
        continue-on-error: true

      - name: Archive cppcheck report
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-report
          path: cppcheck_report.xml

      - name: Fail build on cppcheck errors
        run: cppcheck --enable=warning --error-exitcode=1 .